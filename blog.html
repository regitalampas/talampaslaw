<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | The Law Firm of Talampas &amp; Associates</title>
    <meta
      name="description"
      content="Practical legal insights from The Law Firm of Talampas &amp; Associates for families, workers, and organizations in the Philippines."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Domine:wght@500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #390d2f;
        --bg-primary-deep: #2b0a23;
        --accent: #c9a84c;
        --cta: #ef6c11;
        --text: #1f1720;
        --text-subtle: #53445a;
        --surface: #faf8f5;
        --surface-card: #ffffff;
        --border: #eadde6;
        --max-width: 1120px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Roboto", sans-serif;
        color: var(--text);
        line-height: 1.6;
        background: var(--surface);
      }

      h1,
      h2,
      h3,
      h4 {
        margin: 0;
        line-height: 1.2;
        font-family: "Domine", serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(var(--max-width), 92vw);
        margin: 0 auto;
      }

      .logo-wrap {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
      }

      .logo-image {
        width: 44px;
        height: 44px;
        object-fit: contain;
        border: none;
        border-radius: 12px;
      }

      .logo-text strong {
        color: var(--bg-primary);
        font-size: 1.45rem;
        letter-spacing: 0.04em;
      }

      .logo-text span {
        color: #6b5a6b;
        font-size: 0.72rem;
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(250, 248, 245, 0.95);
        border-bottom: 1px solid #efe7ef;
      }

      .container.nav {
        width: 100%;
        max-width: none;
        padding: 0 24px;
        min-height: 86px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1.4rem;
      }

      .nav-links {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        color: var(--bg-primary);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: 1rem;
        white-space: nowrap;
      }

      .nav-links a:not(:last-child)::after {
        content: "\00b7";
        margin-left: 1rem;
        color: rgba(57, 13, 47, 0.35);
      }

      .nav-consult-btn {
        display: inline-block;
        white-space: nowrap;
        background: var(--cta);
        color: #fff;
        border-radius: 999px;
        padding: 0.5rem 1.75rem;
        font-size: 0.94rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        transition: all 0.2s ease;
      }

      .nav-consult-btn:hover {
        background: #fff;
        color: var(--cta);
        border: 2px solid var(--cta);
      }

      .blog-main {
        display: block;
        padding: 2.8rem 0 3rem;
        width: min(1400px, 96vw);
        margin: 0 auto;
      }

      .panel {
        background: transparent;
        border: none;
        padding: 0;
        width: 100%;
        margin: 0;
      }

      .panel-title {
        color: var(--bg-primary);
        font-size: 1.7rem;
        margin-bottom: 0.1rem;
      }

      .blog-head {
        text-align: center;
        margin-bottom: 0.6rem;
      }

      .blog-head .panel-title {
        font-size: clamp(2rem, 3.4vw, 3rem);
      }

      .filter-label {
        margin: 1rem 0 0.55rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6a586a;
      }

      .filter-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        justify-content: center;
        margin-top: 1.45rem;
      }

      .chip {
        border: 1px solid #e7e8ee;
        border-radius: 999px;
        padding: 0.44rem 0.85rem;
        background: #f2f4f7;
        color: #4b5563;
        font: inherit;
        font-size: 0.8rem;
        letter-spacing: 0.01em;
        cursor: pointer;
      }

      .chip.active {
        background: #a13d78;
        border-color: #a13d78;
        color: #fff;
      }

      .summary {
        margin: 0.8rem 0 0;
        color: #6a5e69;
        font-size: 0.9rem;
      }

      .search-wrap {
        margin: 1rem auto 0;
        display: flex;
        justify-content: center;
      }

      .search-shell {
        position: relative;
        width: min(760px, 100%);
      }

      .search-icon {
        position: absolute;
        left: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        color: #9aa3b2;
        pointer-events: none;
        font-size: 1rem;
      }

      .search-input {
        width: 100%;
        border: 2px solid #d5d9e1;
        border-radius: 999px;
        padding: 0.64rem 1rem 0.64rem 2.45rem;
        font: inherit;
        font-size: 0.92rem;
        background: #fff;
        color: #1f2937;
      }

      .search-input:focus {
        outline: none;
        border-color: #a13d78;
        box-shadow: 0 0 0 3px rgba(161, 61, 120, 0.13);
      }

      .featured-post {
        margin-top: 1rem;
        border: 1px solid #eadde8;
        border-radius: 14px;
        background: #fffdfb;
        overflow: hidden;
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(0, 1.15fr);
        height: 380px;
        max-height: 380px;
      }

      .featured-thumb {
        min-height: 0;
        height: 100%;
      }

      .featured-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .featured-content {
        padding: 1rem;
        display: grid;
        align-content: center;
        gap: 0.55rem;
        overflow: hidden;
      }

      .featured-kicker {
        width: fit-content;
        border-radius: 999px;
        background: #f4e8f0;
        color: var(--bg-primary);
        padding: 0.2rem 0.55rem;
        font-size: 0.69rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .featured-title {
        color: var(--bg-primary);
        font-size: clamp(1.15rem, 2.2vw, 1.7rem);
      }

      .featured-excerpt {
        margin: 0;
        color: #4e3c4f;
        font-size: 0.94rem;
        display: -webkit-box;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .featured-link {
        margin-top: 0.2rem;
        width: fit-content;
        color: var(--bg-primary);
        font-weight: 700;
      }

      .post-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.95rem;
        margin-top: 1rem;
      }

      .post-card {
        background: #fefcfa;
        border: 1px solid #eadde8;
        border-radius: 12px;
        overflow: hidden;
        display: grid;
      }

      .post-thumb {
        aspect-ratio: 16 / 9;
        background: #f1e8ef;
      }

      .post-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .post-content {
        padding: 0.95rem;
        display: grid;
        gap: 0.45rem;
      }

      .post-meta {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        font-size: 0.76rem;
        color: #5d495d;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .post-title {
        font-size: 1.08rem;
        color: var(--bg-primary);
      }

      .post-excerpt {
        margin: 0;
        color: #453448;
        font-size: 0.93rem;
      }

      .post-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .post-tag {
        font-size: 0.7rem;
        padding: 0.18rem 0.5rem;
        border-radius: 999px;
        border: 1px solid #d6bfcb;
        color: #553e55;
      }

      .read-link {
        margin-top: 0.25rem;
        font-weight: 700;
        color: var(--bg-primary);
        width: fit-content;
      }

      .read-link:hover {
        color: var(--cta);
      }

      .empty {
        margin-top: 1rem;
        border: 1px dashed #d9c9d5;
        border-radius: 10px;
        padding: 1rem;
        color: #6a5e69;
        font-size: 0.95rem;
      }

      .load-wrap {
        margin-top: 1rem;
        display: flex;
        justify-content: center;
      }

      .load-btn {
        border: none;
        border-radius: 999px;
        background: var(--cta);
        color: #fff;
        padding: 0.62rem 1.2rem;
        font: inherit;
        font-size: 0.84rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 700;
        cursor: pointer;
      }

      .muted {
        color: #6a5e69;
        font-size: 0.95rem;
      }

      footer {
        background: linear-gradient(145deg, #2f0d28, #47113c 52%, #8b1e63);
        color: rgba(255, 255, 255, 0.95);
        border-top: 1px solid rgba(255, 255, 255, 0.12);
      }

      .footer-inner {
        padding: 2.2rem 0 1.1rem;
        display: grid;
        grid-template-columns: minmax(260px, 1.45fr) repeat(3, minmax(150px, 1fr));
        gap: 1rem;
        row-gap: 1.25rem;
      }

      .footer-col {
        min-height: 0;
      }

      .footer-brand .logo-text strong {
        color: #fff;
      }

      .footer-brand p {
        margin-top: 0.65rem;
        margin-bottom: 0;
        color: #f3d7e8;
        font-size: 0.9rem;
        max-width: 30ch;
      }

      .footer-col h4 {
        margin: 0 0 0.7rem;
        font-size: 0.94rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .footer-links {
        display: grid;
        gap: 0.38rem;
      }

      .footer-links a {
        width: fit-content;
        font-size: 0.89rem;
        color: #f5e3ee;
      }

      .footer-links a:hover {
        color: #fff;
        text-decoration: underline;
      }

      .socials {
        display: flex;
        gap: 0.75rem;
        margin-top: 0.9rem;
      }

      .socials a {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
      }

      .footer-bottom {
        grid-column: 1 / -1;
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        margin-top: 1rem;
        padding-top: 1rem;
      }

      .footer-bottom p {
        margin: 0;
        color: #ecd8e3;
        font-size: 0.8rem;
      }

      .disclaimer {
        margin: 0.55rem 0 0;
        color: #ecd8e3;
        font-size: 0.75rem;
        line-height: 1.45;
      }

      @media (max-width: 980px) {
        .post-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 860px) {
        .nav-links {
          display: none;
        }

        .footer-inner {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .post-grid {
          grid-template-columns: 1fr;
        }

        .featured-post {
          grid-template-columns: 1fr;
          height: auto;
          max-height: none;
        }

        .featured-thumb {
          min-height: 220px;
          height: 220px;
        }
      }

      @media (max-width: 560px) {
        .container.nav {
          padding: 0 14px;
        }

        .container {
          width: min(1120px, 93vw);
        }
      }
    </style>
  </head>
  <body>
    <header id="site-nav"></header>

    <main>
      <section id="posts" class="blog-main">
        <article class="panel">
            <div class="blog-head">
              <h2 class="panel-title">A Grain of Law</h2>
            </div>

            <div class="search-wrap">
              <div class="search-shell">
                <span class="search-icon" aria-hidden="true">⌕</span>
                <input
                  id="search-input"
                  class="search-input"
                  type="search"
                  placeholder="Search blog posts..."
                  aria-label="Search blog posts"
                />
              </div>
            </div>

            <div id="category-chips" class="filter-group" aria-label="Blog categories"></div>

            <section id="featured-post" class="featured-post" hidden>
              <div class="featured-thumb">
                <img id="featured-image" src="" alt="" loading="lazy" />
              </div>
              <div class="featured-content">
                <span class="featured-kicker">Featured Post</span>
                <p id="featured-meta" class="post-meta"></p>
                <h3 id="featured-title" class="featured-title"></h3>
                <p id="featured-excerpt" class="featured-excerpt"></p>
                <a id="featured-link" class="featured-link" href="#">Read more &rarr;</a>
              </div>
            </section>

            <p id="summary" class="summary"></p>

            <section class="post-grid" id="post-grid" aria-live="polite"></section>
            <div id="empty-state" class="empty" hidden>No posts match your current filter.</div>

            <div class="load-wrap">
              <button id="load-more" class="load-btn" type="button">Load More Posts</button>
            </div>
        </article>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="layout-loader.js"></script>
    <script src="ai-chatbot.js"></script>

    <script src="blog-images.js"></script>
    <script src="blog-cms.js"></script>
    <script>
      (() => {
        const PAGE_SIZE = 24;
        const state = {
          activeCategory: "All Posts",
          searchTerm: "",
          visibleCount: PAGE_SIZE,
        };

        const postGrid = document.getElementById("post-grid");
        const categoryChips = document.getElementById("category-chips");
        const searchInput = document.getElementById("search-input");
        const summary = document.getElementById("summary");
        const loadMoreBtn = document.getElementById("load-more");
        const emptyState = document.getElementById("empty-state");
        const featuredSection = document.getElementById("featured-post");
        const featuredImage = document.getElementById("featured-image");
        const featuredMeta = document.getElementById("featured-meta");
        const featuredTitle = document.getElementById("featured-title");
        const featuredExcerpt = document.getElementById("featured-excerpt");
        const featuredLink = document.getElementById("featured-link");

        const allPosts = window.TLFTA_BLOG.getPosts();
        const featuredPost = window.TLFTA_BLOG.getFeaturedPost(allPosts);
        const nonFeaturedPosts = featuredPost
          ? allPosts.filter((post) => post.id !== featuredPost.id)
          : allPosts.slice();
        const query = new URLSearchParams(window.location.search);
        const requestedTag = (query.get("tag") || "").trim();
        const requestedCategory = (query.get("category") || "").trim();
        const requestedSearch = (query.get("search") || "").trim();
        const categoryNames = new Set(
          window.TLFTA_BLOG.getCategoryCounts(allPosts).map((entry) => entry.name)
        );

        if (requestedTag) {
          if (categoryNames.has(requestedTag)) {
            state.activeCategory = requestedTag;
          }
        }

        if (requestedCategory && categoryNames.has(requestedCategory)) {
          state.activeCategory = requestedCategory;
        }

        if (requestedSearch) {
          state.searchTerm = requestedSearch.toLowerCase();
          searchInput.value = requestedSearch;
        }

        const renderFeatured = () => {
          const shouldShowFeatured =
            !!featuredPost &&
            state.activeCategory === "All Posts" &&
            !state.searchTerm;

          if (!shouldShowFeatured) {
            featuredSection.hidden = true;
            featuredSection.style.display = "none";
            return;
          }
          featuredImage.src = featuredPost.imagePath;
          featuredImage.alt = featuredPost.title;
          featuredMeta.textContent = `${featuredPost.category} • ${window.TLFTA_BLOG.formatDisplayDate(
            featuredPost.dateIso
          )}`;
          featuredTitle.textContent = featuredPost.title;
          featuredExcerpt.textContent = featuredPost.excerpt;
          featuredLink.href = `blog-detail.html?id=${encodeURIComponent(featuredPost.id)}`;
          featuredSection.hidden = false;
          featuredSection.style.display = "grid";
        };

        const filteredPosts = () =>
          nonFeaturedPosts.filter((post) => {
            const categoryMatch =
              state.activeCategory === "All Posts" || post.category === state.activeCategory;
            const searchBlob =
              `${post.title} ${post.excerpt} ${post.category} ${post.tags.join(" ")}`.toLowerCase();
            const searchMatch = !state.searchTerm || searchBlob.includes(state.searchTerm);
            return categoryMatch && searchMatch;
          });

        const renderCategoryChips = () => {
          const chips = window.TLFTA_BLOG.getCategoryCounts(allPosts)
            .map(
              (entry) =>
                `<button class="chip ${entry.name === state.activeCategory ? "active" : ""}" type="button" data-category="${entry.name}">${entry.name} ${entry.count}</button>`
            )
            .join("");
          categoryChips.innerHTML = chips;
        };

        const renderPosts = () => {
          const filtered = filteredPosts();
          const visible = filtered.slice(0, state.visibleCount);

          summary.textContent = `Showing ${visible.length} of ${filtered.length} post${
            filtered.length === 1 ? "" : "s"
          }.`;

          if (!visible.length) {
            postGrid.innerHTML = "";
            emptyState.hidden = false;
          } else {
            emptyState.hidden = true;
            postGrid.innerHTML = visible
              .map(
                (post) => `
                  <article class="post-card">
                    <div class="post-thumb">
                      <img src="${post.imagePath}" alt="${post.title}" loading="lazy" />
                    </div>
                    <div class="post-content">
                      <p class="post-meta">${post.category} <span>&bull;</span> ${window.TLFTA_BLOG.formatDisplayDate(
                        post.dateIso
                      )}</p>
                      <h3 class="post-title">${post.title}</h3>
                      <p class="post-excerpt">${post.excerpt}</p>
                      <div class="post-tags">${post.tags
                        .slice(0, 3)
                        .map((tag) => `<span class="post-tag">${tag}</span>`)
                        .join("")}</div>
                      <a class="read-link" href="blog-detail.html?id=${encodeURIComponent(
                        post.id
                      )}">Read Full Post</a>
                    </div>
                  </article>
                `
              )
              .join("");
          }

          loadMoreBtn.hidden = state.visibleCount >= filtered.length;
        };

        categoryChips.addEventListener("click", (event) => {
          const target = event.target.closest("[data-category]");
          if (!target) return;
          state.activeCategory = target.dataset.category;
          state.visibleCount = PAGE_SIZE;
          renderCategoryChips();
          renderFeatured();
          renderPosts();
        });

        loadMoreBtn.addEventListener("click", () => {
          state.visibleCount += PAGE_SIZE;
          renderPosts();
        });

        searchInput.addEventListener("input", () => {
          state.searchTerm = searchInput.value.trim().toLowerCase();
          state.visibleCount = PAGE_SIZE;
          renderFeatured();
          renderPosts();
        });

        renderFeatured();
        renderCategoryChips();
        renderPosts();
      })();
    </script>
  </body>
</html>
